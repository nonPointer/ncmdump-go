name: Release

# 推送 v* tag(如 v1.0.0)时,交叉编译全平台单二进制并发布到 GitHub Release。
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile all platforms
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          for target in darwin/arm64 darwin/amd64 linux/amd64 linux/arm64 windows/amd64; do
            GOOS=${target%/*}; GOARCH=${target#*/}
            ext=""; [ "$GOOS" = "windows" ] && ext=".exe"
            out="dist/ncmdump-${VERSION}-${GOOS}-${GOARCH}${ext}"
            echo "building $out"
            CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o "$out" .
          done

      - name: Generate checksums
        run: cd dist && sha256sum * > SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --title "${GITHUB_REF_NAME}"
